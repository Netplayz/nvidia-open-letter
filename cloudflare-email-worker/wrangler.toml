name = "nvidia-open-letter-email"
main = "worker.js"
compatibility_date = "2024-01-01"

# Email routing - set this up in Cloudflare dashboard:
# 1. Go to your domain > Email > Email Routing
# 2. Create a new address: patches@nvidia-open-letter.netplayz.dev
# 3. Set destination to this worker
#
# Secrets to set:
#   wrangler secret put GITHUB_TOKEN   (fine-grained PAT: contents:write)
#   wrangler secret put GITHUB_REPO    (e.g. "Netplayz/nvidia-open-letter")
