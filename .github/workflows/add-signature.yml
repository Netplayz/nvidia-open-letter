name: Manual Signature Add

on:
  workflow_dispatch:
    inputs:
      signer_name:
        description: "Signer full name"
        required: true
      signer_title:
        description: "Signer title / role"
        required: true
      signer_affiliation:
        description: "Signer affiliation"
        required: true
      signer_github:
        description: "Signer GitHub handle or N/A"
        required: false

permissions:
  contents: write

jobs:
  add-signature:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config user.name "nvidia-open-letter-bot"
          git config user.email "bot@nvidia.ezmirror.net"

      - name: Add signature
        env:
          NAME: ${{ inputs.signer_name }}
          TITLE: ${{ inputs.signer_title }}
          AFFILIATION: ${{ inputs.signer_affiliation }}
          GH: ${{ inputs.signer_github || 'N/A' }}
        run: |
          ENTRY="| ${NAME} | ${TITLE} | ${AFFILIATION} | ${GH} |"
          awk -v entry="$ENTRY" '
            /^\| NetByte/ { print; print entry; next }
            { print }
          ' signatures.md > signatures_tmp.md && mv signatures_tmp.md signatures.md

          git add signatures.md
          git commit -s -m "Sign: ${NAME}"
          git push
