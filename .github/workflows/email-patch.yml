name: Apply Email Patch

on:
  repository_dispatch:
    types: [email-patch]
  workflow_dispatch:
    inputs:
      signer_name:
        description: "Signer full name"
        required: false
      signer_title:
        description: "Signer title / role"
        required: false
      signer_affiliation:
        description: "Signer affiliation"
        required: false
      signer_github:
        description: "Signer GitHub handle or N/A"
        required: false
      patch_content:
        description: "Full git patch (raw content)"
        required: false

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config user.name "nvidia-open-letter-bot"
          git config user.email "bot@nvidia-open-letter.netplayz.dev"

      - name: Quick-add from dispatch payload
        if: github.event_name == 'repository_dispatch' && github.event.payload.signer_name != ''
        env:
          NAME: ${{ github.event.payload.signer_name }}
          TITLE: ${{ github.event.payload.signer_title }}
          AFFILIATION: ${{ github.event.payload.signer_affiliation }}
          GH: ${{ github.event.payload.signer_github || 'N/A' }}
        run: |
          ENTRY="| ${NAME} | ${TITLE} | ${AFFILIATION} | ${GH} |"
          awk -v entry="$ENTRY" '
            /^\| NetByte/ { print; print entry; next }
            { print }
          ' signatures.md > signatures_tmp.md && mv signatures_tmp.md signatures.md

          git add signatures.md
          git commit -s -m "Sign: ${NAME}"
          git push

      - name: Apply full patch from dispatch
        if: github.event_name == 'repository_dispatch' && github.event.payload.patch_content != '' && github.event.payload.signer_name == ''
        env:
          PATCH: ${{ github.event.payload.patch_content }}
        run: |
          echo "$PATCH" > /tmp/patch.patch
          git am --3way /tmp/patch.patch
          git push

      - name: Quick-add from manual input
        if: github.event_name == 'workflow_dispatch' && inputs.signer_name != ''
        env:
          NAME: ${{ inputs.signer_name }}
          TITLE: ${{ inputs.signer_title }}
          AFFILIATION: ${{ inputs.signer_affiliation }}
          GH: ${{ inputs.signer_github || 'N/A' }}
        run: |
          ENTRY="| ${NAME} | ${TITLE} | ${AFFILIATION} | ${GH} |"
          awk -v entry="$ENTRY" '
            /^\| NetByte/ { print; print entry; next }
            { print }
          ' signatures.md > signatures_tmp.md && mv signatures_tmp.md signatures.md

          git add signatures.md
          git commit -s -m "Sign: ${NAME}"
          git push

      - name: Apply patch from manual input
        if: github.event_name == 'workflow_dispatch' && inputs.patch_content != '' && inputs.signer_name == ''
        env:
          PATCH: ${{ inputs.patch_content }}
        run: |
          echo "$PATCH" > /tmp/patch.patch
          git am --3way /tmp/patch.patch
          git push
